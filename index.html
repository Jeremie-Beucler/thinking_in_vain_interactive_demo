  {g1:"librarian",g2:"boxer",adj:"gentle",ls:1.372,n1:150,n2:850,lb:-1.735},
  {g1:"computer programmer",g2:"chef",adj:"nerdy",ls:1.711,n1:150,n2:850,lb:-1.735},
  {g1:"artist",g2:"accountant",adj:"imaginative",ls:1.357,n1:200,n2:800,lb:-1.386},
  {g1:"kindergarten teacher",g2:"boxer",adj:"jovial",ls:1.496,n1:250,n2:750,lb:-1.099},
  {g1:"environmental activist",g2:"accountant",adj:"idealistic",ls:1.552,n1:300,n2:700,lb:-0.847},
  {g1:"actor",g2:"librarian",adj:"charismatic",ls:1.257,n1:300,n2:700,lb:-0.847},
  {g1:"hippy",g2:"accountant",adj:"creative",ls:1.050,n1:350,n2:650,lb:-0.619},
  {g1:"psychologist",g2:"engineer",adj:"empathetic",ls:0.923,n1:350,n2:650,lb:-0.619},
  {g1:"nurse",g2:"lawyer",adj:"warm",ls:1.347,n1:400,n2:600,lb:-0.405},
  {g1:"engineer",g2:"psychologist",adj:"shy",ls:1.267,n1:400,n2:600,lb:-0.405},
  {g1:"politician",g2:"nurse",adj:"selfish",ls:1.925,n1:900,n2:100,lb:2.197},
  {g1:"lawyer",g2:"gardener",adj:"arrogant",ls:1.781,n1:850,n2:150,lb:1.735},
  {g1:"accountant",g2:"artist",adj:"organized",ls:0.878,n1:850,n2:150,lb:1.735},
  {g1:"artist",g2:"accountant",adj:"unconventional",ls:1.560,n1:800,n2:200,lb:1.386},
  {g1:"businessman",g2:"hippy",adj:"ambitious",ls:1.463,n1:700,n2:300,lb:0.847},
  {g1:"politician",g2:"accountant",adj:"persuasive",ls:0.991,n1:750,n2:250,lb:1.099}
];
const SELECTED_ITEMS=[1,3,6,8,9,10,14,16];
let S={scr:"welcome",trials:[],idx:0,resp:[],wEst:0.5,wCI:{lo:0.05,hi:0.95},dbp:0,bStep:0};
let A={ddmStep:0,ddmId:null,ddmDone:false,
       confId:null,confDone:false,confS:0,
       exStep:0,
       trStep:0,trId:null,trDone:{b:false,bay:false,par:false},
       paths:{b:[],bay:[],par:[],b_smooth:null,bay_smooth:null,par_smooth:null},parDrift:0,parG1:"",parG2:"",parAdj:""};
let _smooth=[],_noisy=[];
let confHi=[],confLo=[];
let trDrawn={b:0,bay:0,par:0};
const shuf=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b};
const sig=x=>1/(1+Math.exp(-x));
const $=id=>document.getElementById(id);
const art=w=>/^[aeiou]/i.test(w.trim())?"an":"a";
// Joint MAP estimator: choice + VAS confidence magnitude
// Slider position in [-1,+1]; sign = choice, |pos| = confidence
// Confidence likelihood: Normal(|v|*SCALE/3, SIGMA) on |slider|
const VAS_SCALE=1.2,VAS_SIGMA=0.25;
function estWFull(rs){
  if(rs.length<1)return{w:0.5,lo:0.05,hi:0.95};
  const priorA=3,priorB=3,NG=500;
  const grid=new Float64Array(NG+1);
  let maxLL=-Infinity;
  for(let wi=0;wi<=NG;wi++){
    const w=wi/NG;
    let ll=rs.reduce((s,r)=>{
      const v=w*r.ls+(1-w)*r.lb,p=Math.max(1e-9,Math.min(1-1e-9,sig(v)));
      let lll=r.c?Math.log(p):Math.log(1-p);
      if(r.conf!=null){
        const mu=Math.abs(v)*VAS_SCALE/3,diff=Math.abs(r.conf)-mu;
        lll+=-0.5*(diff/VAS_SIGMA)**2-Math.log(VAS_SIGMA*2.5066);
      }
      return s+lll;
    },0);
    if(0<w&&w<1)ll+=(priorA-1)*Math.log(w)+(priorB-1)*Math.log(1-w);
    else ll=-Infinity; // Beta(3,3) density is 0 at boundaries
    grid[wi]=ll;
    if(ll>maxLL)maxLL=ll;
  }
  // Normalise to get posterior, find MAP and 80% CI
  let sum=0;
  for(let i=0;i<=NG;i++){grid[i]=Math.exp(grid[i]-maxLL);sum+=grid[i];}
  let cumul=0,lo10=-1,hi90=-1,mapW=0,mapV=-Infinity;
  for(let i=0;i<=NG;i++){
    if(grid[i]>mapV){mapV=grid[i];mapW=i/NG;}
    cumul+=grid[i]/sum;
    if(lo10<0&&cumul>=0.10)lo10=i/NG;
    if(hi90<0&&cumul>=0.90)hi90=i/NG;
  }
  return{w:mapW,lo:lo10<0?0:lo10,hi:hi90<0?1:hi90};
}
function estW(rs){return estWFull(rs).w;}
function benefitSim(w,tr){
  // Simulate over ALL conflict items in the full item bank for robustness.
  // P(correct | drift v, boundary a) ≈ sigmoid(v_correct * a)
  const allConflict=TD.filter(t=>Math.sign(t.ls)!==Math.sign(t.lb));
  let lo=0,hi=0;
  for(const t of allConflict){
    const bayV=0.5*t.ls+0.5*t.lb;
    const biasV=w*t.ls+(1-w)*t.lb;
    const correct=bayV>0?1:-1;
    const v=biasV*correct;
    lo+=sig(v*2);
    hi+=sig(v*14);
  }
  return{lo:Math.round(lo/allConflict.length*100),hi:Math.round(hi/allConflict.length*100)}
}
function sRNG(seed){let s=seed>>>0;return()=>{s=(s*1664525+1013904223)>>>0;return s/0xffffffff}}
function mkPath(drift,bnd,seed,dt,sg,mx){dt=dt||0.009;sg=sg||0.16;mx=mx||3500;const rng=sRNG(seed),p=[0];let x=0;for(let i=0;i<mx;i++){x+=drift*dt+sg*Math.sqrt(dt)*(rng()*2-1)*1.732;p.push(x);if(Math.abs(x)>=bnd)break}return p}
function mkSmooth(drift,bnd,flat,dt){flat=flat||30;dt=dt||0.009;const p=[];for(let i=0;i<flat;i++)p.push(0);let x=0;for(let i=0;i<4000;i++){x+=drift*dt;p.push(x);if(Math.abs(x)>=Math.abs(bnd))break}return p}
function mkFlat(drift,bnd,seed,flat){flat=flat||30;return[...new Array(flat).fill(0),...mkPath(drift,bnd,seed)]}
function mkFixed(drift,steps,seed,dt,sg){dt=dt||0.012;sg=sg||0.13;const rng=sRNG(seed),p=[0];let x=0;for(let i=0;i<steps;i++){x+=drift*dt+sg*Math.sqrt(dt)*(rng()*2-1)*1.732;p.push(x)}return p}

function render(){$("app").innerHTML=({welcome:rWelcome,instructions:rInst,trial:rTrial,debrief:rDB}[S.scr]||rWelcome)();bind();if(S.scr==="debrief")setTimeout(afterRender,80)}
const navBar=n=>`<div class="page-nav"><span class="page-step">${n+1} / 11</span><button class="btn btn-pri" id="btn-next">Continue &rarr;</button></div>`;
function rWelcome(){return`<div style="padding-top:1.5rem"><h1 style="font-size:2rem;margin-bottom:.35rem">Are you thinking in vain?</h1><p style="font-size:1.05rem;color:var(--dm);margin-bottom:2rem">An interactive demonstration</p><div class="card"><p style="margin-top:.25rem">You will complete <b>8 short reasoning problems</b>. Your responses are used to estimate your reasoning profile on the fly. Afterward, we walk through the normative computation, a model of how you combined the available information, and what this tells us about deliberation and bias.</p><p>This demonstration illustrates the main findings of our recent work: <b>Thinking in Vain: A Mechanistic Account of Biased Evidence Accumulation in Reasoning</b> (Beucler, Purcell, Charles, De Neys &amp; Desender).</p><p style="font-style:italic;color:#8090a8;margin-top:.3rem">Built with the help of Claude.</p></div><div class="btn-row"><button class="btn btn-pri" id="btn-start">Start &rarr;</button></div></div>`}
function rInst(){return`<div><div class="db-eye">Instructions</div><h1>How it works</h1><div class="card" style="margin-top:.75rem"><p>Each problem describes a fictional study with two groups. You'll see how many people are in each group and a one-word description of a randomly selected individual.</p><p><b>Your task:</b> drag the slider toward the group you think the individual most likely belongs to. Drag further if you're confident, stay near center if you're unsure.</p><div class="card-sm" style="text-align:center;opacity:.85"><div style="font-size:.72rem;color:#8090a8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem">Example (non-interactive preview)</div><div class="t-line">This study contains lawyers and nurses.</div><div class="t-line">Person 'A' is kind.</div><div class="t-line">There are 995 lawyers and 5 nurses.</div><div style="margin-top:.9rem"><div style="display:flex;justify-content:space-between;font-size:.82rem;font-weight:500;color:var(--tx);margin-bottom:.35rem"><span>a lawyer</span><span>a nurse</span></div><div style="position:relative;height:10px;border-radius:5px;background:var(--s2);border:1px solid var(--bd)"><div style="position:absolute;top:50%;left:72%;width:22px;height:22px;border-radius:50%;background:#fff;border:2.5px solid var(--tx);transform:translate(-50%,-50%)"></div></div><div style="display:flex;justify-content:space-between;font-size:.68rem;color:#8090a8;margin-top:.4rem;font-style:italic"><span>certain</span><span>uncertain</span><span>certain</span></div></div></div></div><div class="btn-row"><button class="btn btn-pri" id="btn-inst">Begin &rarr;</button></div></div>`}
function rTrial(){const t=S.trials[S.idx],flip=t.flip,lg=flip?t.g2:t.g1,rg=flip?t.g1:t.g2,L=String.fromCharCode(65+S.idx);

<div class="vas-wrap" id="vas-wrap">
  <div class="vas-group-labels"><span class="vas-group-lbl">${art(lg)} ${lg}</span><span class="vas-group-lbl right">${art(rg)} ${rg}</span></div>

</div>
<button class="btn btn-pri vas-submit" id="vas-submit" disabled>Confirm &rarr;</button>
</div></div>`}
function rDB(){return[rDB0,rDB1,rDB2,rDB3,rDB4,rDB5,rDB6,rDB7,rDB8,rDB9,rDB10][S.dbp]()}

// DB0: Context
function rDB0(){return`<div><h1>Context and objectives</h1>
<div class="card" style="margin-top:.75rem"><h2>Base-rate neglect</h2><p style="margin-top:.4rem">People tend to underweight base-rate information when forming probabilistic judgments — a robust reasoning bias with important implications in medicine, law, and many other decision domains (Kahneman &amp; Tversky, 1974).</p></div>
<div class="card" style="border-left:3px solid var(--or)"><h2>Modeling biased reasoning</h2><p style="margin-top:.4rem">We use base-rate neglect as an example to formally model what happens when people reason in a biased way. A model that jointly explains choices, response times, and confidence allows us to address questions such as:</p>
<ul style="margin:.6rem 0 .6rem 1.2rem;color:#566070;font-size:.95rem;line-height:1.9">
<li>Why are biased people <b>confidently wrong</b>, fast and certain even when the base-rate should dominate?</li>
<li>Why are they <b>thinking in vain</b>, deliberating longer without correcting their response?</li>
</ul>
<p>The answer lies in the structure of the evidence signal itself, and how much weight each person places on each source of information.</p></div>

  const t=Math.max(-1,Math.min(1,val/maxV));
  if(t>=0){
    return`rgb(${Math.round(255-t*50)},${Math.round(255-t*140)},${Math.round(255-t*200)})`;
  } else {
    const s=-t;
    return`rgb(${Math.round(255-s*200)},${Math.round(255-s*140)},${Math.round(255-s*10)})`;
  }
}
function drawColorBar(ctx,x,y,w,h,colorFn,minV,maxV,lblL,lblR,colL,colR){
  for(let i=0;i<Math.round(w);i++){
    const v=minV+(maxV-minV)*i/w;
    ctx.fillStyle=colorFn(v,Math.max(Math.abs(minV),Math.abs(maxV)));
    ctx.fillRect(x+i,y,1.5,h);
  }
  ctx.strokeStyle="rgba(0,0,0,.1)";ctx.lineWidth=0.5;ctx.strokeRect(x,y,w,h);
  ctx.font="7.5px DM Sans,sans-serif";
  ctx.fillStyle=colL||"#7a8aa0";ctx.textAlign="left";ctx.fillText(lblL,x,y+h+8);
  ctx.fillStyle=colR||"#7a8aa0";ctx.textAlign="right";ctx.fillText(lblR,x+w,y+h+8);
}
const HM_LAYOUT={ml:46,mr:6,mt:22,mb:48,n:30};
function hmAxes(ctx,W,H,ml,mr,mt,mb,iw,ih){
  // X axis
  ctx.fillStyle="#566070";ctx.font="9px DM Sans,sans-serif";ctx.textAlign="center";
  ctx.fillText("Base-rate strength",ml+iw/2,H-3);
  ctx.font="7.5px DM Sans,sans-serif";ctx.fillStyle="#8090a8";
  ctx.textAlign="left";ctx.fillText("990 librarians,",ml,H-14);
  ctx.fillText("10 boxers",ml,H-5);
  ctx.textAlign="right";ctx.fillText("10 librarians,",ml+iw,H-14);
  ctx.fillText("990 boxers",ml+iw,H-5);
  ctx.textAlign="center";ctx.fillText("equal",ml+iw/2,H-14);
  // Y axis
  ctx.save();ctx.translate(8,mt+ih/2);ctx.rotate(-Math.PI/2);
  ctx.fillStyle="#566070";ctx.font="9px DM Sans,sans-serif";ctx.textAlign="center";
  ctx.fillText("Stereotype strength",0,0);ctx.restore();
  ctx.font="7.5px DM Sans,sans-serif";ctx.fillStyle="#8090a8";ctx.textAlign="right";
  ctx.fillText('"muscular"',ml-3,mt+6);
  ctx.fillText('"average"',ml-3,mt+ih/2+3);
  ctx.fillText('"bookish"',ml-3,mt+ih-1);
}
function drawHeatmap(cvId,wVal,maxV){
  const cv=$(cvId);if(!cv)return;
  const ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
  const{ml,mr,mt,mb,n}=HM_LAYOUT,iw=W-ml-mr,ih=H-mt-mb;
  const lsRange=Array.from({length:n},(_,i)=>-2.5+5*i/(n-1));
  const lbRange=Array.from({length:n},(_,i)=>-3+6*i/(n-1));
  const cw=iw/n,ch=ih/n;
  ctx.clearRect(0,0,W,H);
  for(let yi=0;yi<n;yi++){
    for(let xi=0;xi<n;xi++){
      const lb=lbRange[xi],ls=lsRange[n-1-yi];
      ctx.fillStyle=hmColor(Math.abs(wVal*ls+(1-wVal)*lb),maxV);
      ctx.fillRect(ml+xi*cw,mt+yi*ch,cw+.5,ch+.5);
    }
  }
  // Color bar
  drawColorBar(ctx,ml,4,iw,6,hmColor,0,maxV,"slow, uncertain","fast, confident","#8090a8","#8090a8");
  // Indifference line: Bayesian is maximally uncertain where 0.5*ls+0.5*lb=0, i.e. ls=-lb
  // ls=-lb means: when ls=2.5, lb=-2.5 (top-left) to ls=-2.5, lb=2.5 (bottom-right)
  ctx.strokeStyle="rgba(255,255,255,.55)";ctx.lineWidth=1.2;ctx.setLineDash([4,3]);
  const ix0=ml+(((-2.5)+3)/6)*iw, iy0=mt+((2.5-(2.5))/5)*ih;
  const ix1=ml+(((2.5)+3)/6)*iw, iy1=mt+((2.5-(-2.5))/5)*ih;
  ctx.beginPath();ctx.moveTo(ix0,iy0);ctx.lineTo(ix1,iy1);ctx.stroke();ctx.setLineDash([]);
  hmAxes(ctx,W,H,ml,mr,mt,mb,iw,ih);
  // Corner labels
  ctx.font="italic 600 9px DM Sans,sans-serif";
  ctx.fillStyle="rgba(255,255,255,.7)";ctx.textAlign="right";ctx.fillText("boxer",ml+iw-4,mt+11);
  ctx.textAlign="left";ctx.fillText("librarian",ml+4,mt+ih-4);
}
function drawDiffHeatmap(cvId,wVal,maxV){
  const cv=$(cvId);if(!cv)return;
  const ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
  const{ml,mr,mt,mb,n}=HM_LAYOUT,iw=W-ml-mr,ih=H-mt-mb;
  const lsRange=Array.from({length:n},(_,i)=>-2.5+5*i/(n-1));
  const lbRange=Array.from({length:n},(_,i)=>-3+6*i/(n-1));
  const cw=iw/n,ch=ih/n;
  ctx.clearRect(0,0,W,H);
  for(let yi=0;yi<n;yi++){
    for(let xi=0;xi<n;xi++){
      const lb=lbRange[xi],ls=lsRange[n-1-yi];
      const diff=Math.abs(wVal*ls+(1-wVal)*lb)-Math.abs(0.5*ls+0.5*lb);
      ctx.fillStyle=hmDivColor(diff,maxV);
      ctx.fillRect(ml+xi*cw,mt+yi*ch,cw+.5,ch+.5);
    }
  }
  // Color bar
  drawColorBar(ctx,ml,4,iw,6,(v,m)=>hmDivColor(v,m),-maxV,maxV,"too slow / uncertain","too fast / confident","#2255aa","#d05c10");
  hmAxes(ctx,W,H,ml,mr,mt,mb,iw,ih);
}
function drawHeatmaps(){
  drawHeatmap("hm-med",0.95,3.5);
}
function drawUserHeatmaps(){
  drawHeatmap("hm-user",S.wEst,3.5);
  drawDiffHeatmap("hm-diff-user",S.wEst,2.5);
}

// ── DDM CANVAS ────────────────────────────────────────────────────────────
function pregenDDM(){
  if(!_smooth.length)_smooth=mkSmooth(0.5,1.0,30,0.009);
  if(!_noisy.length)_noisy=mkFlat(0.5,1.0,42,30)
}
function ddmLayout(){return{ml:58,mr:22,mt:54,mb:38,bnd:1.0,flat:30}}
function drawDDMBase(cv){
  const ctx=cv.getContext("2d"),W=cv.width,H=cv.height;
  const{ml,mr,mt,mb}=ddmLayout(),iw=W-ml-mr,ih=H-mt-mb;
  ctx.clearRect(0,0,W,H);ctx.fillStyle="#eceff6";ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#b0bcd0";ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(ml,mt);ctx.lineTo(ml,mt+ih);ctx.lineTo(ml+iw,mt+ih);ctx.stroke();
  ctx.fillStyle="#7a8aa0";ctx.font="11px DM Sans,sans-serif";ctx.textAlign="center";
  ctx.fillText("Time",ml+iw/2,H-3);
  ctx.save();ctx.translate(14,mt+ih/2);ctx.rotate(-Math.PI/2);ctx.fillText("Evidence",0,0);ctx.restore();
  cv._ml=ml;cv._mr=mr;cv._mt=mt;cv._mb=mb;cv._iw=iw;cv._ih=ih
}
function drawDDMState(cv,step,sS,sN){
  drawDDMBase(cv);
  const ctx=cv.getContext("2d"),{ml:ml,mt:mt,iw:iw,ih:ih}={ml:cv._ml,mt:cv._mt,iw:cv._iw,ih:cv._ih};
  const{bnd,flat}=ddmLayout();
  const toY=v=>mt+ih/2-v*(ih/2)/bnd;
  const maxL=Math.max(_smooth.length,_noisy.length,400);
  const toX=s=>ml+s/maxL*iw;
  const spX=ml+4,spY=toY(0),byU=toY(bnd),byL=toY(-bnd);
  // step>=1: SP
  if(step>=1){
    ctx.beginPath();ctx.arc(spX,spY,7,0,Math.PI*2);ctx.fillStyle="#1a2030";ctx.fill();
    ctx.font="600 11px DM Sans,sans-serif";ctx.fillStyle="#1a2030";ctx.textAlign="left";
    ctx.fillText("z",spX+12,spY-6);
    ctx.strokeStyle="rgba(0,0,0,.06)";ctx.lineWidth=.8;
    ctx.beginPath();ctx.moveTo(ml,spY);ctx.lineTo(ml+iw,spY);ctx.stroke()
  }
  // step>=2: boundaries
  if(step>=2){
    [[byU,"rgba(208,92,16,.55)","Response A"],[byL,"rgba(30,136,204,.55)","Response B"]].forEach(([y,c,lbl])=>{
      ctx.strokeStyle=c;ctx.lineWidth=1.5;ctx.setLineDash([5,5]);
      ctx.beginPath();ctx.moveTo(ml,y);ctx.lineTo(ml+iw,y);ctx.stroke();ctx.setLineDash([]);
      ctx.font="600 10px DM Sans,sans-serif";ctx.fillStyle=c.replace(".55","1");ctx.textAlign="left";
      ctx.fillText(lbl,ml+4,y+(y===byU?-6:14))
    });
    // 'a' bracket
    ctx.fillStyle="rgba(42,48,80,.55)";ctx.font="11px DM Sans,sans-serif";ctx.textAlign="left";
    ctx.fillText("a",ml+iw+5,toY(bnd)+8);
    ctx.strokeStyle="rgba(42,48,80,.35)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ml+iw+14,byU+3);ctx.lineTo(ml+iw+14,byL-3);ctx.stroke();
    [byU+3,byL-3].forEach(y=>{ctx.beginPath();ctx.moveTo(ml+iw+11,y);ctx.lineTo(ml+iw+17,y);ctx.stroke()})
  }
  // step>=3: t0 annotation (static)
  if(step>=3){
    const t0X=toX(flat),annY=spY+32;
    ctx.strokeStyle="rgba(80,100,130,.45)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(spX,annY);ctx.lineTo(t0X,annY);ctx.stroke();
    [spX,t0X].forEach(x=>{ctx.beginPath();ctx.moveTo(x,annY-3);ctx.lineTo(x,annY+3);ctx.stroke()});
    ctx.font="600 10px DM Sans,sans-serif";ctx.fillStyle="rgba(60,80,110,.8)";ctx.textAlign="center";
    ctx.fillText("t\u2080",(spX+t0X)/2,annY+13)
  }
  // step>=4: smooth drift (animated by sS)
  if(step>=4&&sS>0){
    const ns=Math.min(sS,_smooth.length);
    ctx.strokeStyle="rgba(208,92,16,.8)";ctx.lineWidth=2.5;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(spX,spY);
    for(let i=1;i<ns;i++){const x=toX(i),y=toY(Math.max(-bnd,Math.min(bnd,_smooth[i])));ctx.lineTo(x,y)}
    ctx.stroke();
    if(sS>70){
      const qi=Math.min(ns-1,Math.round(ns*.4)),qx=toX(qi),qy=toY(Math.max(-bnd,Math.min(bnd,_smooth[qi])));
      ctx.beginPath();ctx.moveTo(qx,qy);ctx.lineTo(qx,qy-22);ctx.strokeStyle="rgba(208,92,16,.55)";ctx.lineWidth=1.2;ctx.stroke();
      ctx.beginPath();ctx.moveTo(qx-3,qy-19);ctx.lineTo(qx,qy-24);ctx.lineTo(qx+3,qy-19);ctx.fillStyle="rgba(208,92,16,.55)";ctx.fill();
      ctx.font="600 10px DM Sans,sans-serif";ctx.fillStyle="rgba(208,92,16,.9)";ctx.textAlign="left";ctx.fillText("v > 0",qx+4,qy-24)
    }
  }
  // step>=5: noisy trajectory (animated by sN)
  if(step>=5&&sN>0){
    // ghost of smooth
    if(_smooth.length>0){
      ctx.strokeStyle="rgba(208,92,16,.15)";ctx.lineWidth=2;ctx.setLineDash([3,4]);
      ctx.beginPath();ctx.moveTo(spX,spY);
      for(let i=1;i<Math.min(_smooth.length,sN);i++){ctx.lineTo(toX(i),toY(Math.max(-bnd,Math.min(bnd,_smooth[i]))))}
      ctx.stroke();ctx.setLineDash([])
    }
    const nn=Math.min(sN,_noisy.length);
    ctx.strokeStyle="rgba(208,92,16,.9)";ctx.lineWidth=2.2;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(spX,spY);
    for(let i=1;i<nn;i++){ctx.lineTo(toX(i),toY(Math.max(-bnd,Math.min(bnd,_noisy[i]))))}
    ctx.stroke();
    if(sN>=_noisy.length){
      const last=_noisy[_noisy.length-1],rx=toX(_noisy.length-1),ry=toY(Math.max(-bnd,Math.min(bnd,last)));

const TR_N_NOISY=10; // number of stochastic trajectories per reasoner
function genCappedPaths(drift,bnd,flat,maxLen){
  const paths=[];let seed=40;
  while(paths.length<TR_N_NOISY&&seed<500){
    const p=mkFlat(drift,bnd,seed,flat);
    seed++;
    if(p.length<=maxLen)paths.push(p);
  }
  return paths;
}
function genTrimmedPaths(drift,bnd,flat){
  // First pass uncapped, then cap at 1.5× median to remove outliers
  const raw=genCappedPaths(drift,bnd,flat,3500);
  const sorted=[...raw].sort((a,b)=>a.length-b.length);
  const medLen=sorted[Math.floor(sorted.length/2)].length;
  const cap=Math.round(medLen*1.5);
  return genCappedPaths(drift,bnd,flat,cap);
}

function trPlay(which){

        bay:"<b>Bayesian reasoner (w = 0.50):</b> Negative drift (v = \u22120.42) \u2014 base-rate dominates. On average: slower, lower confidence \u2014 the correct answer (librarian).",
        par:"<b>Your trajectory (w = "+S.wEst.toFixed(2)+"):</b> "+A.parG1+" vs "+A.parG2+", '"+A.parAdj+"'. Drift v = "+(A.parDrift>0?"+":"")+A.parDrift+"."
      };

const DEL_ITEMS_RAW=TD.filter(t=>Math.sign(t.ls)!==Math.sign(t.lb));

function accCurve(wVal,nPts){
  const aMin=0,aMax=8;

  ctx.strokeStyle="#b0bcd0";ctx.lineWidth=1.2;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(ml,mt);ctx.lineTo(ml,mt+ih);ctx.lineTo(ml+iw,mt+ih);ctx.stroke();
  ctx.fillStyle="#7a8aa0";ctx.font="11px DM Sans,sans-serif";ctx.textAlign="center";
  ctx.fillText("Decision boundary (a)",ml+iw/2,H-5);
  ctx.save();ctx.translate(13,mt+ih/2);ctx.rotate(-Math.PI/2);ctx.fillText("% correct",0,0);ctx.restore();
  [0,2,4,6,8].forEach(v=>{
    const xp=ml+(v/8)*iw;
    ctx.fillStyle="#8090a8";ctx.font="10px DM Sans,sans-serif";ctx.textAlign="center";
    ctx.fillText(v,xp,mt+ih+12);
  });
  // Horizontal legend row at TOP of chart area (above curves, below y-axis start)
  const legendItems=[
    {col:"rgba(30,136,204,.9)",dash:[],lbl:"Bayesian (w\u00a0=\u00a00.50)"},
    {col:"rgba(208,92,16,.9)",dash:[6,4],lbl:"Stereotype-dom. (w\u00a0=\u00a00.95)"},
    {col:"rgba(88,88,200,.9)",dash:[3,3],lbl:"Base-rate dom. (w\u00a0=\u00a00.05)"},
    ...(showUser&&(userStep==null||userStep>=nPts)?[{col:"rgba(22,152,88,.95)",dash:[],lbl:"You (w\u00a0=\u00a0"+S.wEst.toFixed(2)+")"}]:[]),
  ];
  const lyLeg=mt-20,segW=16,gap=5,rowH=14;
  ctx.font="9px DM Sans,sans-serif";
  // Split legend into rows that fit within iw
  const rows=[[]];let rowW=0;
  legendItems.forEach(item=>{
    const itemW=segW+gap+ctx.measureText(item.lbl).width+12;
    if(rows[rows.length-1].length>0&&rowW+itemW-12>iw){rows.push([]);rowW=0;}
    rows[rows.length-1].push(item);rowW+=itemW;
  });
  rows.forEach((row,ri)=>{
    const totalRW=row.reduce((s,{lbl})=>s+ctx.measureText(lbl).width+segW+gap+12,0)-12;
    let lx=ml+(iw-totalRW)/2;
    const ly=lyLeg+ri*rowH;
    row.forEach(({col,dash,lbl})=>{
      ctx.strokeStyle=col;ctx.lineWidth=1.8;ctx.setLineDash(dash);
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+segW,ly);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle="#566070";ctx.font="9px DM Sans,sans-serif";ctx.textAlign="left";
      const w=ctx.measureText(lbl).width;
      ctx.fillText(lbl,lx+segW+gap,ly+3.5);
      lx+=segW+gap+w+12;
    });
  });
}
function animBenBars(){
  _delUserStep=0;if(_delUserId){cancelAnimationFrame(_delUserId);_delUserId=null;}
  drawDelCurves(false);
  const btn=$("del-play");
  if(btn)btn.addEventListener("click",()=>{
    btn.disabled=true;
    _delUserStep=0;
    const nPts=60;
    function go(){
      _delUserStep=Math.min(_delUserStep+1,nPts);
      drawDelCurves(true,_delUserStep);
      if(_delUserStep<nPts){_delUserId=requestAnimationFrame(go)}
      else{
        _delUserId=null;btn.classList.add("btn-done");
        const d=$("del-debrief");if(d){d.style.display="block";d.style.opacity="0";d.style.transition="opacity .5s";setTimeout(()=>{d.style.opacity="1"},20);}
      }
    }
    requestAnimationFrame(go);
  });
}
render();
</script></body></html>
